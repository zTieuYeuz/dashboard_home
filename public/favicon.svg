<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Background with gradient feel -->
  <rect width="32" height="32" rx="7" fill="#0b0d14"/>
  <rect width="32" height="32" rx="7" fill="url(#bg-grad)" opacity="0.4"/>
  <defs>
    <linearGradient id="bg-grad" x1="0" y1="0" x2="32" y2="32" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#1e3a5f"/>
      <stop offset="100%" stop-color="#0b0d14"/>
    </linearGradient>
  </defs>

  <!-- Top server rack -->
  <rect x="5" y="6" width="22" height="5.5" rx="1.5" fill="#111827" stroke="#3b82f6" stroke-width="0.8"/>
  <!-- LED strip -->
  <rect x="7" y="7.5" width="5.5" height="2.5" rx="0.6" fill="#1d4ed8" opacity="0.9"/>
  <!-- Status dots -->
  <circle cx="20" cy="8.75" r="1" fill="#34d399"/>
  <circle cx="23" cy="8.75" r="1" fill="#34d399"/>

  <!-- Middle server rack -->
  <rect x="5" y="13.5" width="22" height="5.5" rx="1.5" fill="#111827" stroke="#60a5fa" stroke-width="0.8"/>
  <rect x="7" y="15" width="5.5" height="2.5" rx="0.6" fill="#2563eb" opacity="0.9"/>
  <circle cx="20" cy="16.25" r="1" fill="#34d399"/>
  <circle cx="23" cy="16.25" r="1" fill="#fbbf24"/>

  <!-- WiFi / network arcs -->
  <path d="M12.5 27 Q16 23.5 19.5 27" fill="none" stroke="#60a5fa" stroke-width="1.4" stroke-linecap="round"/>
  <path d="M10 29 Q16 23 22 29" fill="none" stroke="#3b82f6" stroke-width="1" stroke-linecap="round" opacity="0.55"/>
  <circle cx="16" cy="28" r="1.1" fill="#60a5fa"/>
</svg>
