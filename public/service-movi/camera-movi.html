<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Camera MOVI — Dashboard</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:oklch(0.18 0.012 250);--surface:oklch(0.22 0.012 250);--surface-2:oklch(0.26 0.012 250);
  --card:oklch(0.21 0.012 250);--border:oklch(0.31 0.012 250);--border-soft:oklch(0.27 0.012 250);
  --text:oklch(0.96 0.005 250);--text-2:oklch(0.86 0.008 250);--muted:oklch(0.62 0.012 250);
  --accent:oklch(0.72 0.18 290);--ok:oklch(0.74 0.16 155);--bad:oklch(0.68 0.20 25);
  --font-sans:'Inter',system-ui,sans-serif;--font-mono:'JetBrains Mono','Fira Code',monospace;
  --radius:12px;--radius-sm:8px;
}
html,body{font-family:var(--font-sans);background:var(--bg);color:var(--text);min-height:100%;font-size:13px;-webkit-font-smoothing:antialiased}

.topbar{position:sticky;top:0;z-index:100;display:flex;align-items:center;gap:16px;padding:0 24px;height:52px;background:var(--surface);border-bottom:1px solid var(--border-soft);backdrop-filter:blur(12px)}
a.brand{display:flex;align-items:baseline;gap:8px;text-decoration:none;color:inherit;margin-right:20px}
.brand-main{font-size:15px;font-weight:700;letter-spacing:-.02em}
.brand-sub{font-size:12px;color:var(--muted);font-family:var(--font-mono)}
.topbar-nav{display:flex;gap:2px}
.topbar-nav a{font-size:12px;font-weight:500;padding:5px 10px;border-radius:var(--radius-sm);color:var(--muted);transition:all .15s;text-decoration:none}
.topbar-nav a:hover{color:var(--text);background:var(--surface-2)}
.topbar-nav a.active{color:var(--text);background:var(--surface-2)}
.topbar-right{display:flex;align-items:center;gap:8px;margin-left:auto}
.status-badge{font-size:11px;color:var(--muted);padding:4px 10px;background:var(--surface-2);border:1px solid var(--border-soft);border-radius:var(--radius-sm);font-family:var(--font-mono)}
.hdr-btn{font-size:12px;padding:4px 12px;border-radius:var(--radius-sm);border:.5px solid var(--border);background:transparent;color:var(--text-2);cursor:pointer;font-family:var(--font-sans);transition:all .15s}
.hdr-btn:hover{background:var(--surface-2)}
.last-update{font-size:11px;color:var(--muted)}

.page{padding:.85rem 1.25rem 2rem;max-width:1800px;margin:0 auto}

/* Camera grid */
.cam-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px}
@media(max-width:1200px){.cam-grid{grid-template-columns:repeat(3,1fr)}}
@media(max-width:800px){.cam-grid{grid-template-columns:repeat(2,1fr)}}
@media(max-width:500px){.cam-grid{grid-template-columns:1fr}}

/* Camera cell */
.cam-cell{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;transition:border-color .2s}
.cam-cell:hover{border-color:color-mix(in oklch,var(--accent) 40%,transparent)}
.cam-cell.cam-off{border-color:var(--border-soft);opacity:.7}

/* Label bar */
.cam-label{display:flex;align-items:center;gap:6px;padding:6px 10px;background:var(--surface);border-bottom:1px solid var(--border-soft)}
.cam-name{font-size:11px;font-weight:600;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-family:var(--font-mono)}

/* Admin rename controls */
.cam-rename-btn{flex-shrink:0;background:none;border:none;cursor:pointer;color:var(--muted);font-size:12px;padding:2px 4px;border-radius:4px;line-height:1;transition:color .15s}
.cam-rename-btn:hover{color:var(--accent)}
.cam-rename-row{display:none;align-items:center;gap:4px;padding:4px 10px;background:var(--surface-2);border-bottom:1px solid var(--border-soft)}
.cam-rename-row.visible{display:flex}
.cam-rename-input{flex:1;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-sm);padding:4px 8px;color:var(--text);font-size:12px;font-family:var(--font-mono);outline:none}
.cam-rename-input:focus{border-color:var(--accent)}
.cam-rename-save{font-size:11px;font-weight:600;padding:3px 10px;border-radius:var(--radius-sm);border:1px solid color-mix(in oklch,var(--ok) 40%,transparent);background:color-mix(in oklch,var(--ok) 12%,transparent);color:var(--ok);cursor:pointer}
.cam-rename-cancel{font-size:11px;padding:3px 8px;border-radius:var(--radius-sm);border:1px solid var(--border);background:none;color:var(--muted);cursor:pointer}
.toggle-btn{flex-shrink:0;display:flex;align-items:center;gap:4px;font-size:11px;font-weight:600;padding:3px 9px;border-radius:20px;border:1px solid;cursor:pointer;transition:all .2s;white-space:nowrap;background:transparent;font-family:var(--font-sans)}
.toggle-btn.is-on{color:var(--ok);border-color:color-mix(in oklch,var(--ok) 30%,transparent);background:color-mix(in oklch,var(--ok) 10%,transparent)}
.toggle-btn.is-on:hover{background:color-mix(in oklch,var(--ok) 20%,transparent)}
.toggle-btn.is-off{color:var(--muted);border-color:var(--border);background:var(--surface-2)}
.toggle-btn.is-off:hover{color:var(--text);border-color:var(--muted)}
.toggle-dot{width:6px;height:6px;border-radius:50%;background:currentColor}

/* Frame area */
.cam-frame{position:relative;width:100%;padding-top:56.25%}
.cam-frame iframe{position:absolute;inset:0;width:100%;height:100%;border:none;background:#000}
.cam-overlay{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;background:var(--bg)}
.cam-overlay .ico{font-size:28px;opacity:.3}
.cam-overlay .msg{font-size:11px;color:var(--muted);text-align:center}
.resume-btn{font-size:11px;padding:4px 14px;border-radius:20px;border:1px solid color-mix(in oklch,var(--ok) 30%,transparent);background:color-mix(in oklch,var(--ok) 10%,transparent);color:var(--ok);cursor:pointer;font-family:var(--font-sans);font-weight:600;transition:all .2s}
.resume-btn:hover{background:color-mix(in oklch,var(--ok) 20%,transparent)}

.err-banner{background:color-mix(in oklch,var(--bad) 10%,transparent);border:1px solid color-mix(in oklch,var(--bad) 30%,transparent);border-radius:var(--radius-sm);padding:10px 14px;font-size:12px;color:var(--bad);margin-bottom:12px}
</style>
</head>
<body>
<div class="topbar">
  <a href="/" class="brand"><span class="brand-main">MOVI</span><span class="brand-sub">dashboard</span></a>
  <nav class="topbar-nav">
    <a href="/">Overview</a>
    <a href="/bookmarks.html">Bookmarks</a>
    <a href="/settings.html" id="settings-link" style="display:none">⚙ Settings</a>
  </nav>
  <div class="topbar-right">
    <span class="status-badge" id="status-badge">— / — streaming</span>
    <button class="hdr-btn" onclick="setAll(true)">▶ Bật tất cả</button>
    <button class="hdr-btn" onclick="setAll(false)">⏸ Tắt tất cả</button>
    <span class="last-update" id="last-update">—</span>
  </div>
</div>

<div class="page">
  <div id="err-banner" class="err-banner" style="display:none"></div>
  <div class="cam-grid" id="cam-grid"></div>
</div>

<script>
/* ── Permission gate ── */
(function(){
  function _readUserCookie(){try{var m=document.cookie.match(/(?:^|;\s*)dh_user=([^;]+)/);return m?JSON.parse(decodeURIComponent(m[1])):null;}catch(e){return null;}}
  var U=window.__USER__||_readUserCookie()||{role:'user',permissions:{},isAdmin:false};
  var perm=U.isAdmin?'write':(U.permissions&&U.permissions['camera-movi']||'none');
  if(perm==='none'){
    document.addEventListener('DOMContentLoaded',function(){
      var pg=document.querySelector('.page')||document.body;
      pg.innerHTML='<div style="display:flex;flex-direction:column;align-items:center;justify-content:center;height:60vh;gap:12px;color:#71717a">'
        +'<div style="font-size:48px">🔒</div>'
        +'<div style="font-size:17px;font-weight:600;color:#f4f4f5">Không có quyền truy cập</div>'
        +'<div style="font-size:13px">Trang Camera Movi yêu cầu quyền truy cập.<br>Liên hệ admin để được cấp quyền.</div>'
        +'<a href="/" style="margin-top:8px;font-size:13px;color:#3b82f6;text-decoration:none">← Về trang chủ</a></div>';
    });
  }
})();

const MODE = 'webrtc,mse,hls,mjpeg';

let _streams      = [];
let _camUrl       = '';
let _labels       = {};   // stream → display name (default + aliases merged)
let _streamToCamId = {}; // stream → camId (for alias API)
let _isAdmin      = false;
let _state        = {};   // stream → bool (ON/OFF), always starts fresh each page load

async function init() {
  // Do NOT restore from localStorage — cameras always start OFF on page load (issue #6)
  try {
    const r = await fetch('/api/camera-token');
    if (!r.ok) throw new Error('Lỗi lấy danh sách camera');
    const d = await r.json();
    if (d.error) throw new Error(d.error);
    _streams       = d.streams || [];
    _camUrl        = d.url    || '';
    _labels        = d.labels || {};
    _streamToCamId = d.streamToCamId || {};
    _isAdmin       = d.isAdmin || false;
    // All cameras default OFF
    _streams.forEach(s => { _state[s] = false; });
    render();
    document.getElementById('last-update').textContent = new Date().toLocaleTimeString('vi-VN');
  } catch(e) {
    const b = document.getElementById('err-banner');
    b.textContent = '⚠ ' + e.message;
    b.style.display = '';
  }
}

function render() {
  const grid = document.getElementById('cam-grid');
  grid.innerHTML = _streams.map(s => {
    const isOn = _state[s];
    const name = _labels[s] || s;
    const camId = _streamToCamId[s] || s;
    const renameBtn = _isAdmin
      ? `<button class="cam-rename-btn" title="Đổi tên camera" onclick="openRename('${esc(s)}','${esc(camId)}')">✏</button>`
      : '';
    const frame = isOn
      ? `<iframe src="${_camUrl}/stream.html?src=${encodeURIComponent(s)}&mode=${MODE}" allow="autoplay" allowfullscreen></iframe>`
      : `<div class="cam-overlay">
           <div class="ico">⏸</div>
           <div class="msg">Stream đã tắt</div>
           <button class="resume-btn" onclick="toggle('${esc(s)}')">▶ Bật lại</button>
         </div>`;
    return `
      <div class="cam-cell ${isOn?'':'cam-off'}" id="cell-${esc(s)}">
        <div class="cam-label">
          <span class="cam-name" id="lbl-${esc(s)}">${esc(name)}</span>
          ${renameBtn}
          <button class="toggle-btn ${isOn?'is-on':'is-off'}" onclick="toggle('${esc(s)}')">
            <span class="toggle-dot"></span>${isOn?'ON':'OFF'}
          </button>
        </div>
        <div class="cam-rename-row" id="rename-row-${esc(s)}">
          <input class="cam-rename-input" id="rename-inp-${esc(s)}" type="text" value="${esc(name)}" placeholder="Tên hiển thị…" maxlength="50">
          <button class="cam-rename-save" onclick="saveRename('${esc(s)}','${esc(camId)}')">✓ Lưu</button>
          <button class="cam-rename-cancel" onclick="closeRename('${esc(s)}')">✕</button>
        </div>
        <div class="cam-frame">${frame}</div>
      </div>`;
  }).join('');
  updateBadge();
}

function esc(v){ return String(v||'').replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/'/g,'&#39;'); }

function toggle(s) {
  _state[s] = !_state[s];
  render();
}

function setAll(on) {
  _streams.forEach(s => _state[s] = on);
  render();
}

function updateBadge() {
  const on = _streams.filter(s => _state[s]).length;
  document.getElementById('status-badge').textContent = `${on} / ${_streams.length} streaming`;
}

/* ── Admin: rename camera ── */
function openRename(stream, camId) {
  const row = document.getElementById('rename-row-' + stream);
  if (!row) return;
  row.classList.toggle('visible');
  if (row.classList.contains('visible')) {
    const inp = document.getElementById('rename-inp-' + stream);
    if (inp) { inp.value = _labels[stream] || stream; inp.focus(); inp.select(); }
  }
}
function closeRename(stream) {
  const row = document.getElementById('rename-row-' + stream);
  if (row) row.classList.remove('visible');
}
async function saveRename(stream, camId) {
  const inp = document.getElementById('rename-inp-' + stream);
  if (!inp) return;
  const newName = inp.value.trim();
  try {
    const r = await fetch('/api/admin/camera-aliases-movi', {
      method: 'PUT',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ camId, name: newName })
    });
    const d = await r.json();
    if (!r.ok || d.error) throw new Error(d.error || 'Lỗi lưu tên');
    // Update local labels with server-returned aliases
    _streams.forEach(s => {
      const cId = _streamToCamId[s] || s;
      if (d.aliases && d.aliases[cId]) _labels[s] = d.aliases[cId];
    });
    // If alias was cleared for this stream, restore default
    if (d.aliases && !d.aliases[camId]) {
      // Keep whatever was the original default (server already handles via labels)
    }
    closeRename(stream);
    render();
  } catch(e) {
    alert('Lỗi: ' + e.message);
  }
}

init();
</script>
</body>
</html>
