<!DOCTYPE html>
<html lang="vi" data-theme="dark">
<head>
<link rel="icon" type="image/svg+xml" href="/favicon.svg"/>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet"/>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Camera Dashboard</title>
<style>
:root,[data-theme="dark"]{
  --bg:oklch(0.18 0.012 250);--surface:oklch(0.22 0.012 250);--surface-2:oklch(0.26 0.012 250);
  --card:oklch(0.21 0.012 250);--border:oklch(0.31 0.012 250);--border-soft:oklch(0.27 0.012 250);
  --text:oklch(0.96 0.005 250);--text-2:oklch(0.86 0.008 250);--muted:oklch(0.62 0.012 250);
  --accent:oklch(0.72 0.18 290);--ok:oklch(0.74 0.16 155);--warn:oklch(0.78 0.16 70);--bad:oklch(0.68 0.20 25);
  --font-sans:'IBM Plex Sans',system-ui,sans-serif;--font-mono:'IBM Plex Mono',ui-monospace,monospace;
  --radius:12px;--radius-sm:8px;
}
[data-theme="light"]{
  --bg:oklch(0.985 0.003 250);--surface:oklch(1 0 0);--surface-2:oklch(0.965 0.005 250);
  --card:oklch(1 0 0);--border:oklch(0.91 0.008 250);--border-soft:oklch(0.94 0.008 250);
  --text:oklch(0.22 0.015 250);--text-2:oklch(0.36 0.015 250);--muted:oklch(0.55 0.012 250);
  --accent:oklch(0.55 0.18 290);--ok:oklch(0.52 0.15 155);--warn:oklch(0.62 0.16 70);--bad:oklch(0.55 0.20 25);
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{font-family:var(--font-sans);background:var(--bg);color:var(--text);-webkit-font-smoothing:antialiased}
button{font:inherit;color:inherit;background:none;border:none;cursor:pointer}
a{color:inherit;text-decoration:none}
.topbar{display:flex;align-items:center;justify-content:space-between;padding:0 28px;height:52px;background:var(--surface);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:50;backdrop-filter:blur(12px);flex-shrink:0}
.topbar-left{display:flex;align-items:center;gap:28px}
.topbar-right{display:flex;align-items:center;gap:8px}
.brand{display:flex;align-items:center;gap:10px}
.brand-mark{width:30px;height:30px;display:grid;place-items:center;background:var(--accent);color:var(--bg);border-radius:var(--radius-sm);box-shadow:0 4px 14px color-mix(in oklch,var(--accent) 25%,transparent)}
.brand-name{font-weight:600;font-size:14px;line-height:1.1}
.brand-sub{font-size:11px;color:var(--muted);margin-top:1px}
.topnav{display:flex;gap:2px}
.topnav-item{font-size:13px;font-weight:500;color:var(--muted);padding:6px 12px;border-radius:var(--radius-sm);transition:all .12s;text-decoration:none}
.topnav-item:hover{color:var(--text);background:var(--surface-2)}
.topnav-item.active{color:var(--text);background:var(--surface-2)}
.clock{font-family:var(--font-mono);font-size:13px;color:var(--text-2);padding:6px 10px;background:var(--surface-2);border:1px solid var(--border-soft);border-radius:var(--radius-sm)}
.btn{display:inline-flex;align-items:center;gap:6px;padding:6px 12px;font-size:13px;font-weight:500;border:1px solid var(--border);background:var(--surface-2);color:var(--text-2);border-radius:var(--radius-sm);transition:all .12s;cursor:pointer}
.btn.ghost{background:transparent}
.btn:hover{color:var(--text);border-color:var(--muted)}
.theme-toggle{width:32px;height:32px;display:grid;place-items:center;padding:0}
@keyframes spin{to{transform:rotate(360deg)}}
.btn.refreshing .ri{animation:spin .6s linear infinite}

.page{padding:20px 28px 48px;max-width:1600px;margin:0 auto}
.cam-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:.85rem}
@media(max-width:1100px){.cam-grid{grid-template-columns:repeat(2,1fr)}}
@media(max-width:650px){.cam-grid{grid-template-columns:1fr}}

.cam-cell{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;transition:border-color .2s}
.cam-cell.cam-off{border-color:var(--border-soft)}
.cam-cell.cam-unconfigured{opacity:.55}

.cam-label{display:flex;align-items:center;gap:8px;padding:7px 10px;background:var(--surface);border-bottom:1px solid var(--border)}
.cam-name{font-size:12px;font-weight:600;letter-spacing:.2px;flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.cam-type{font-size:10px;padding:2px 7px;border-radius:8px;font-weight:500;border:1px solid;white-space:nowrap;flex-shrink:0}
.cam-type.analog{background:color-mix(in oklch,var(--ok) 12%,transparent);color:var(--ok);border-color:color-mix(in oklch,var(--ok) 30%,transparent)}
.cam-type.ip{background:color-mix(in oklch,var(--accent) 12%,transparent);color:var(--accent);border-color:color-mix(in oklch,var(--accent) 30%,transparent)}
.cam-type.unknown{background:color-mix(in oklch,var(--muted) 12%,transparent);color:var(--muted);border-color:color-mix(in oklch,var(--muted) 30%,transparent)}

/* Toggle button */
.toggle-btn{
  flex-shrink:0;
  display:flex;align-items:center;gap:4px;
  font-size:11px;font-weight:600;font-family:var(--font-sans);
  padding:3px 9px;border-radius:20px;border:1px solid;
  cursor:pointer;transition:all .2s;white-space:nowrap;
  background:transparent;
}
.toggle-btn.is-on{color:var(--ok);border-color:color-mix(in oklch,var(--ok) 30%,transparent);background:color-mix(in oklch,var(--ok) 10%,transparent)}
.toggle-btn.is-on:hover{background:color-mix(in oklch,var(--ok) 18%,transparent)}
.toggle-btn.is-off{color:var(--muted);border-color:var(--border);background:var(--surface-2)}
.toggle-btn.is-off:hover{color:var(--text);border-color:var(--muted)}
.toggle-dot{width:6px;height:6px;border-radius:50%;background:currentColor}

/* Frame */
.cam-frame{position:relative;width:100%;padding-top:56.25%}
.cam-frame iframe{position:absolute;top:0;left:0;width:100%;height:100%;border:none;background:#000}

/* Overlays */
.cam-overlay{
  position:absolute;top:0;left:0;width:100%;height:100%;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:10px;
}
.cam-overlay.paused{background:var(--bg)}
.cam-overlay.unconfigured{background:var(--card)}
.cam-overlay .ico{font-size:30px;opacity:.35}
.cam-overlay .msg{font-size:12px;color:var(--muted);text-align:center;line-height:1.7}
.cam-overlay .resume-btn{
  font-size:11px;padding:4px 14px;border-radius:20px;
  border:1px solid color-mix(in oklch,var(--ok) 30%,transparent);background:color-mix(in oklch,var(--ok) 10%,transparent);color:var(--ok);
  cursor:pointer;font-family:var(--font-sans);font-weight:600;transition:all .2s;
}
.cam-overlay .resume-btn:hover{background:color-mix(in oklch,var(--ok) 18%,transparent)}

/* Bottom bar */
.bottom-bar{margin-top:.85rem;display:flex;align-items:center;justify-content:space-between;padding:10px 14px;background:var(--card);border:1px solid var(--border);border-radius:var(--radius);flex-wrap:wrap;gap:8px}
.bar-info{font-size:11.5px;color:var(--muted)}
.bar-info strong{color:var(--text)}
.legend{display:flex;gap:14px;flex-wrap:wrap}
.leg-item{display:flex;align-items:center;gap:5px;font-size:11px;color:var(--muted)}
.leg-dot{width:8px;height:8px;border-radius:50%}
@media(max-width:700px){
  .topbar{height:auto;flex-wrap:wrap;padding:.625rem .75rem;gap:6px}
  .topbar-left{width:100%;gap:8px}
  .brand-name{font-size:13px}
  .brand-sub{display:none}
  .topbar-right{width:100%;overflow-x:auto;flex-wrap:nowrap;gap:6px;padding-bottom:2px;scrollbar-width:none}
  .topbar-right::-webkit-scrollbar{display:none}
  .btn{flex-shrink:0;white-space:nowrap}
  .page{padding:.75rem}
  .cam-grid{grid-template-columns:1fr !important}
  .bottom-bar{flex-direction:column;align-items:flex-start;gap:10px}
  .legend{gap:10px}
}
</style>
</head>
<body>

<header class="topbar">
  <div class="topbar-left">
    <div class="brand">
      <div class="brand-mark" aria-hidden="true">
        <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="3"/><path d="M2 12h3M19 12h3M12 2v3M12 19v3"/><path d="M5.6 5.6l2.1 2.1M16.3 16.3l2.1 2.1M5.6 18.4l2.1-2.1M16.3 7.7l2.1-2.1"/></svg>
      </div>
      <div><div class="brand-name">Home Lab</div><div class="brand-sub">Camera · go2rtc</div></div>
    </div>
    <nav class="topnav">
      <a class="topnav-item" href="/">Overview</a>
      <a class="topnav-item" href="/bookmarks.html">Bookmarks</a>
      <a class="topnav-item" id="settings-link" href="/settings.html" style="display:none">⚙ Settings</a>
    </nav>
  </div>
  <div class="topbar-right">
    <span class="btn ghost" id="status-badge" style="pointer-events:none;font-family:var(--font-mono);font-size:12px">—</span>
    <button class="btn ghost" onclick="setAll(true)">▶ Bật tất cả</button>
    <button class="btn ghost" onclick="setAll(false)">⏸ Tắt tất cả</button>
    <div class="clock" id="clock">--:--:--</div>
    <button class="btn ghost theme-toggle" id="themeToggle" title="Toggle theme">
      <svg viewBox="0 0 16 16" width="14" height="14" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"><circle cx="8" cy="8" r="3"/><path d="M8 1.5v1.5M8 13v1.5M14.5 8h-1.5M3 8h-1.5M12.6 3.4l-1.05 1.05M4.45 11.55l-1.05 1.05M12.6 12.6l-1.05-1.05M4.45 4.45l-1.05-1.05"/></svg>
    </button>
  </div>
</header>

<div class="page">
  <div class="cam-grid" id="cam-grid"></div>

  <div class="bottom-bar">
    <div class="bar-info">Stream qua <strong>go2rtc</strong> → Cloudflare Tunnel → Browser · Độ trễ ~0.5–2s</div>
    <div style="display:flex;align-items:center;gap:14px;flex-wrap:wrap">
      <div style="font-size:11px;color:var(--muted);background:var(--surface-2);border:1px solid var(--border);border-radius:var(--radius-sm);padding:4px 10px;white-space:nowrap">
        💡 Dùng <strong style="color:var(--text)">⧉ Pop out</strong> để PiP vẫn chạy khi về Dashboard
      </div>
      <div class="legend">
        <div class="leg-item"><div class="leg-dot" style="background:var(--ok)"></div>Analog</div>
        <div class="leg-item"><div class="leg-dot" style="background:var(--accent)"></div>IP Camera</div>
        <div class="leg-item"><div class="leg-dot" style="background:var(--muted)"></div>Chờ cấu hình</div>
      </div>
    </div>
  </div>
</div>

<script>
/* ── Auth ── */
function _readUserCookie(){
  try{var m=document.cookie.match(/dh_user=([^;]+)/);if(!m)return null;return JSON.parse(decodeURIComponent(m[1]));}catch{return null;}
}
if(typeof window.__USER__==='undefined'){
  var _u=_readUserCookie();
  if(_u)window.__USER__=_u;
  else{window.location.href='/login.html';}
}

/* ── Camera definitions ── */
const BASE = 'https://camera.home-server.id.vn';
const MODE = 'webrtc,mse,hls,mjpeg';

var USER = (typeof window.__USER__ !== 'undefined') ? window.__USER__ : {};
var CAMERAS = [];

/* ── State (persisted in localStorage) ── */
const LS_KEY = 'cam_state_v1';
function loadState(){
  try{ return JSON.parse(localStorage.getItem(LS_KEY)||'{}'); }catch{ return {}; }
}
function saveState(state){ localStorage.setItem(LS_KEY, JSON.stringify(state)); }

// Default: all configured cameras ON
let state = loadState();

function initCameras() {
  fetch('/api/admin/cameras')
    .then(function(r){ return r.ok ? r.json() : Promise.reject(r.status); })
    .then(function(d) {
      var allCams = d.cameras || [];
      // Filter by permission for non-admin users
      var allowedIds = USER.isAdmin ? null : (USER.cameras || []);
      var visible = allowedIds === null ? allCams
        : allCams.filter(function(c){ return allowedIds.indexOf(c.id) >= 0; });

      CAMERAS = visible.map(function(c) {
        return {
          id:    c.id,
          name:  c.name || c.id,
          type:  c.type || 'ip',
          label: c.stream ? (c.type === 'analog' ? 'Analog · ' : 'IP · ') + c.stream : 'Stream: ' + c.id,
          src:   c.stream || null
        };
      });

      // Init state for any new camera not yet in localStorage
      CAMERAS.forEach(function(c) {
        if (!(c.id in state)) state[c.id] = c.src !== null;
      });

      render();
    })
    .catch(function() {
      document.getElementById('cam-grid').innerHTML =
        '<div style="padding:24px;text-align:center;color:var(--bad);font-size:13px">Không tải được danh sách camera</div>';
    });
}

/* ── Render grid ── */
function render(){
  const grid = document.getElementById('cam-grid');
  grid.innerHTML = CAMERAS.map(function(c){
    const isOn  = state[c.id];
    const isUnconfigured = c.src === null;
    const cellCls = isUnconfigured ? 'cam-cell cam-unconfigured' : isOn ? 'cam-cell' : 'cam-cell cam-off';

    const toggleHTML = isUnconfigured ? '' :
      '<button class="toggle-btn '+(isOn?'is-on':'is-off')+'" onclick="toggle(\''+c.id+'\')">'
      +'<span class="toggle-dot"></span>'+(isOn?'ON':'OFF')+'</button>';

    const frameContent = isUnconfigured
      ? '<div class="cam-overlay unconfigured"><div class="ico">🔒</div><div class="msg">Chưa cấu hình<br><small>Cần cập nhật mật khẩu</small></div></div>'
      : isOn
        ? '<iframe id="frame-'+c.id+'" src="'+BASE+'/stream.html?src='+c.src+'&mode='+MODE+'" allow="autoplay" allowfullscreen></iframe>'
        : '<div class="cam-overlay paused"><div class="ico">⏸</div><div class="msg">Stream đã tắt</div>'
          +'<button class="resume-btn" onclick="toggle(\''+c.id+'\')">▶ Bật lại</button></div>';

    return '<div class="'+cellCls+'" id="cell-'+c.id+'">'
      +'<div class="cam-label">'
        +'<span class="cam-name">'+c.name+'</span>'
        +'<span class="cam-type '+c.type+'">'+c.label+'</span>'
        +toggleHTML
      +'</div>'
      +'<div class="cam-frame">'+frameContent+'</div>'
      +'</div>';
  }).join('');

  updateBadge();
}

/* ── Toggle single camera ── */
function toggle(id){
  const cam = CAMERAS.find(function(c){ return c.id===id; });
  if(!cam || cam.src===null) return;
  state[id] = !state[id];
  saveState(state);
  render();
}

/* ── Set all on/off ── */
function setAll(on){
  CAMERAS.forEach(function(c){ if(c.src!==null) state[c.id]=on; });
  saveState(state);
  render();
}

/* ── Badge count ── */
function updateBadge(){
  const configured = CAMERAS.filter(function(c){ return c.src!==null; });
  const on = configured.filter(function(c){ return state[c.id]; });
  document.getElementById('status-badge').textContent = on.length+' / '+CAMERAS.length+' streaming';
}

initCameras();

/* ── Navigation helpers ── */
function goBack() {
  window.location.href = '/';
}

function openPopout() {
  // Save current state so popup inherits it
  saveState(state);
  var w = screen.width  * 0.72 | 0;
  var h = screen.height * 0.80 | 0;
  var l = ((screen.width  - w) / 2) | 0;
  var t = ((screen.height - h) / 2) | 0;
  window.open(
    window.location.href,
    'camera-popout',
    'width='+w+',height='+h+',left='+l+',top='+t+',menubar=no,toolbar=no,location=no,status=no,scrollbars=yes'
  );
}

/* ── Cảnh báo khi stream đang chạy mà navigate hoặc đóng tab ── */
window.addEventListener('beforeunload', function(e) {
  var anyStreaming = CAMERAS.some(function(c){ return c.src !== null && state[c.id]; });
  if (anyStreaming) {
    e.preventDefault();
    // returnValue required for Chrome/Edge to show native dialog
    e.returnValue = 'Stream camera đang chạy. Bạn có chắc muốn rời trang?';
    return e.returnValue;
  }
});

(function initTheme(){
  var saved=null; try{saved=localStorage.getItem('dh_theme')}catch(e){}
  if(saved==='light')document.documentElement.dataset.theme='light';
  var btn=document.getElementById('themeToggle');
  if(btn)btn.addEventListener('click',function(){
    var next=document.documentElement.dataset.theme==='light'?'dark':'light';
    document.documentElement.dataset.theme=next;
    try{localStorage.setItem('dh_theme',next)}catch(e){}
  });
})();
setInterval(function(){var c=document.getElementById('clock');if(c)c.textContent=new Date().toLocaleTimeString('vi-VN',{hour12:false});},1000);
</script>
</body>
</html>
