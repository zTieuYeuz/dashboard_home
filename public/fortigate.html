<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>FortiGate Dashboard</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0b0d14;--surface:#131620;--card:#1a1d2e;--border:#252840;
  --text:#e2e8f0;--muted:#64748b;--accent:#60a5fa;
  --green:#34d399;--red:#f87171;--amber:#fbbf24;--purple:#a78bfa;
}
html,body{height:100%;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:var(--bg);color:var(--text)}

/* ── Header ── */
.header{
  background:var(--surface);border-bottom:.5px solid var(--border);
  padding:0 1.25rem;height:48px;
  display:flex;align-items:center;justify-content:space-between;
  position:sticky;top:0;z-index:10;
}
.hdr-left{display:flex;align-items:center;gap:10px}
.back-btn{font-size:12px;padding:4px 10px;border-radius:6px;border:.5px solid var(--border);background:transparent;color:var(--muted);cursor:pointer;transition:all .15s}
.back-btn:hover{color:var(--text);border-color:#3d4260}
.hdr-title{display:flex;align-items:center;gap:8px}
.hdr-name{font-size:14px;font-weight:600}
.hdr-sub{font-size:11px;color:var(--muted)}
.hdr-right{display:flex;align-items:center;gap:8px}
.refresh-btn{font-size:12px;padding:4px 10px;border-radius:6px;border:.5px solid var(--border);background:transparent;color:var(--accent);cursor:pointer;transition:all .15s}
.refresh-btn:hover{background:#1e3a5f;border-color:var(--accent)}
.status-dot{width:8px;height:8px;border-radius:50%;background:var(--green);display:inline-block;margin-right:6px}
.status-dot.red{background:var(--red)}
.status-dot.amber{background:var(--amber)}
.last-update{font-size:11px;color:var(--muted)}

/* ── Layout ── */
.page{padding:1.25rem;max-width:1400px;margin:0 auto}

/* ── Stats row ── */
.stats-row{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:10px;margin-bottom:1.25rem}
.stat-card{background:var(--card);border:.5px solid var(--border);border-radius:10px;padding:14px 16px}
.stat-label{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.6px;margin-bottom:6px}
.stat-value{font-size:22px;font-weight:700;line-height:1}
.stat-sub{font-size:11px;color:var(--muted);margin-top:4px}
.stat-value.green{color:var(--green)}
.stat-value.red{color:var(--red)}
.stat-value.amber{color:var(--amber)}
.stat-value.blue{color:var(--accent)}

/* ── Two column layout ── */
.main-grid{display:grid;grid-template-columns:1fr 1fr;gap:1rem}
@media(max-width:900px){.main-grid{grid-template-columns:1fr}}

/* ── Panel ── */
.panel{background:var(--card);border:.5px solid var(--border);border-radius:10px;overflow:hidden;margin-bottom:1rem}
.panel-header{padding:12px 16px;border-bottom:.5px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.panel-title{font-size:12px;font-weight:600;text-transform:uppercase;letter-spacing:.6px;color:var(--muted)}
.panel-badge{font-size:10px;padding:2px 8px;border-radius:10px;background:#1e2440;color:var(--accent);border:.5px solid #2d3a6a}
.panel-body{padding:14px 16px}

/* ── Resource bars ── */
.res-item{margin-bottom:14px}
.res-item:last-child{margin-bottom:0}
.res-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:5px}
.res-name{font-size:12px;font-weight:500}
.res-val{font-size:12px;color:var(--muted)}
.bar-track{height:6px;background:#1e2440;border-radius:3px;overflow:hidden}
.bar-fill{height:100%;border-radius:3px;transition:width .5s ease}
.bar-green{background:var(--green)}
.bar-amber{background:var(--amber)}
.bar-red{background:var(--red)}

/* ── Info rows ── */
.info-row{display:flex;justify-content:space-between;align-items:center;padding:7px 0;border-bottom:.5px solid var(--border)}
.info-row:last-child{border-bottom:none}
.info-key{font-size:12px;color:var(--muted)}
.info-val{font-size:12px;font-weight:500;text-align:right;max-width:200px;word-break:break-all}

/* ── Interface list ── */
.iface-item{display:flex;align-items:center;padding:9px 0;border-bottom:.5px solid var(--border);gap:10px}
.iface-item:last-child{border-bottom:none}
.iface-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.iface-dot.up{background:var(--green)}
.iface-dot.down{background:var(--red)}
.iface-info{flex:1;min-width:0}
.iface-name{font-size:12px;font-weight:600;display:flex;align-items:center;gap:5px}
.iface-alias{font-size:10px;color:var(--muted)}
.iface-ip{font-size:11px;color:var(--accent);margin-top:1px;font-family:monospace}
.iface-right{text-align:right;font-size:10px;color:var(--muted);flex-shrink:0}
.iface-speed{font-size:11px;font-weight:500;color:var(--text)}
.iface-traffic{font-size:10px;color:var(--muted);margin-top:1px}
.badge-up{font-size:9px;padding:1px 5px;border-radius:4px;background:#0d2d1e;color:var(--green);border:.5px solid #1a5c3a}
.badge-down{font-size:9px;padding:1px 5px;border-radius:4px;background:#2d0d0d;color:var(--red);border:.5px solid #5c1a1a}

/* ── VPN list ── */
.vpn-item{padding:9px 0;border-bottom:.5px solid var(--border)}
.vpn-item:last-child{border-bottom:none}
.vpn-header{display:flex;align-items:center;justify-content:space-between;gap:8px;margin-bottom:4px}
.vpn-name{font-size:12px;font-weight:600;display:flex;align-items:center;gap:6px}
.vpn-rgwy{font-size:10px;color:var(--muted);font-family:monospace}
.vpn-tunnels{padding-left:14px}
.vpn-tunnel-row{display:flex;justify-content:space-between;font-size:10px;color:var(--muted);padding:2px 0}
.vpn-empty{font-size:12px;color:var(--muted);text-align:center;padding:20px}

/* ── Skeleton / loading ── */
.skeleton{background:linear-gradient(90deg,#1a1d2e 25%,#22263a 50%,#1a1d2e 75%);background-size:200% 100%;animation:shimmer 1.4s infinite}
@keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}
.skel-text{height:13px;border-radius:4px;margin-bottom:6px}

/* ── Error ── */
.error-box{background:#1a0f0f;border:.5px solid #5c1a1a;border-radius:8px;padding:16px;color:var(--red);font-size:13px;text-align:center}

/* ── Spin ── */
@keyframes spin{to{transform:rotate(360deg)}}
.spin{display:inline-block;animation:spin .8s linear infinite}
</style>
</head>
<body>

<div class="header">
  <div class="hdr-left">
    <button class="back-btn" onclick="history.back()">← Dashboard</button>
    <div class="hdr-title">
      <span style="font-size:16px">🔥</span>
      <div>
        <div class="hdr-name">FortiGate</div>
        <div class="hdr-sub" id="hdr-sub">Firewall · Security Gateway</div>
      </div>
    </div>
  </div>
  <div class="hdr-right">
    <span class="last-update" id="last-update"></span>
    <button class="refresh-btn" onclick="load()" id="refresh-btn">⟳ Refresh</button>
  </div>
</div>

<div class="page">
  <!-- Stats row -->
  <div class="stats-row" id="stats-row">
    <div class="stat-card"><div class="stat-label">CPU</div><div class="stat-value skeleton skel-text" style="width:60%"></div></div>
    <div class="stat-card"><div class="stat-label">Memory</div><div class="stat-value skeleton skel-text" style="width:60%"></div></div>
    <div class="stat-card"><div class="stat-label">Sessions</div><div class="stat-value skeleton skel-text" style="width:60%"></div></div>
    <div class="stat-card"><div class="stat-label">Interfaces Up</div><div class="stat-value skeleton skel-text" style="width:60%"></div></div>
    <div class="stat-card"><div class="stat-label">VPN Tunnels</div><div class="stat-value skeleton skel-text" style="width:60%"></div></div>
    <div class="stat-card"><div class="stat-label">Uptime</div><div class="stat-value skeleton skel-text" style="width:80%"></div></div>
  </div>

  <!-- Main grid -->
  <div class="main-grid">
    <!-- Left column -->
    <div>
      <!-- Resource bars -->
      <div class="panel">
        <div class="panel-header"><span class="panel-title">📈 Resources</span></div>
        <div class="panel-body" id="res-panel">
          <div class="skeleton skel-text" style="width:100%;margin-bottom:16px"></div>
          <div class="skeleton skel-text" style="width:100%;margin-bottom:16px"></div>
          <div class="skeleton skel-text" style="width:100%"></div>
        </div>
      </div>

      <!-- System info -->
      <div class="panel">
        <div class="panel-header"><span class="panel-title">⚙️ System Info</span></div>
        <div class="panel-body" id="sys-panel">
          <div class="skeleton skel-text" style="width:100%;margin-bottom:8px"></div>
          <div class="skeleton skel-text" style="width:80%"></div>
        </div>
      </div>
    </div>

    <!-- Right column -->
    <div>
      <!-- Interfaces -->
      <div class="panel">
        <div class="panel-header">
          <span class="panel-title">🌐 Interfaces</span>
          <span class="panel-badge" id="iface-badge">—</span>
        </div>
        <div class="panel-body" id="iface-panel">
          <div class="skeleton skel-text" style="width:100%;margin-bottom:10px"></div>
          <div class="skeleton skel-text" style="width:90%"></div>
        </div>
      </div>

      <!-- VPN -->
      <div class="panel">
        <div class="panel-header">
          <span class="panel-title">🔒 VPN IPSec</span>
          <span class="panel-badge" id="vpn-badge">—</span>
        </div>
        <div class="panel-body" id="vpn-panel">
          <div class="skeleton skel-text" style="width:80%"></div>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
function fmtBytes(b) {
  if (b === null || b === undefined) return '—';
  if (b >= 1e12) return (b/1e12).toFixed(2) + ' TB';
  if (b >= 1e9)  return (b/1e9).toFixed(2)  + ' GB';
  if (b >= 1e6)  return (b/1e6).toFixed(1)   + ' MB';
  if (b >= 1e3)  return (b/1e3).toFixed(0)   + ' KB';
  return b + ' B';
}
function fmtNum(n) {
  if (n === null || n === undefined) return '—';
  return Number(n).toLocaleString();
}
function barClass(pct) {
  if (pct >= 85) return 'bar-red';
  if (pct >= 65) return 'bar-amber';
  return 'bar-green';
}
function valClass(pct) {
  if (pct >= 85) return 'red';
  if (pct >= 65) return 'amber';
  return 'green';
}

async function load() {
  const btn = document.getElementById('refresh-btn');
  btn.innerHTML = '<span class="spin">⟳</span> Loading';
  btn.disabled = true;

  try {
    const r = await fetch('/api/fortigate');
    const d = await r.json();

    if (d.error) {
      document.getElementById('stats-row').innerHTML =
        `<div class="error-box" style="grid-column:1/-1">⚠️ ${d.error}</div>`;
      return;
    }

    renderStats(d);
    renderResources(d.resources);
    renderSysInfo(d.system);
    renderInterfaces(d.interfaces, d.stats);
    renderVPN(d.vpn, d.stats);

    const sub = d.system.hostname
      ? `${d.system.model} · ${d.system.version}`
      : 'FortiGate Firewall';
    document.getElementById('hdr-sub').textContent = sub;
    document.getElementById('last-update').textContent =
      'Updated ' + new Date().toLocaleTimeString('vi-VN');

  } catch(e) {
    document.getElementById('stats-row').innerHTML =
      `<div class="error-box" style="grid-column:1/-1">⚠️ Lỗi kết nối: ${e.message}</div>`;
  } finally {
    btn.innerHTML = '⟳ Refresh';
    btn.disabled = false;
  }
}

function renderStats(d) {
  const r = d.resources || {};
  const s = d.stats || {};
  const sys = d.system || {};

  const cpu  = r.cpuPct  !== null ? r.cpuPct  : '—';
  const mem  = r.memPct  !== null ? r.memPct  : '—';
  const sess = r.sessions !== null ? fmtNum(r.sessions) : '—';

  document.getElementById('stats-row').innerHTML = `
    <div class="stat-card">
      <div class="stat-label">CPU</div>
      <div class="stat-value ${valClass(cpu)}">${cpu !== '—' ? cpu+'%' : '—'}</div>
      <div class="stat-sub">Processor load</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Memory</div>
      <div class="stat-value ${valClass(mem)}">${mem !== '—' ? mem+'%' : '—'}</div>
      <div class="stat-sub">RAM usage</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Sessions</div>
      <div class="stat-value blue">${sess}</div>
      <div class="stat-sub">Active connections</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Interfaces Up</div>
      <div class="stat-value ${s.ifaceUp > 0 ? 'green' : 'red'}">${s.ifaceUp ?? '—'}</div>
      <div class="stat-sub">of ${s.ifaceTotal ?? '?'} total</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">VPN Tunnels</div>
      <div class="stat-value ${s.vpnUp > 0 ? 'green' : (s.vpnTotal === 0 ? 'muted' : 'amber')}">${s.vpnUp ?? 0}/${s.vpnTotal ?? 0}</div>
      <div class="stat-sub">IPSec up/total</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Uptime</div>
      <div class="stat-value" style="font-size:15px;color:var(--text)">${sys.uptime || '—'}</div>
      <div class="stat-sub">Since last reboot</div>
    </div>
  `;
}

function renderResources(r) {
  if (!r) return;
  const items = [
    { label: 'CPU Usage',    val: r.cpuPct,  unit: '%' },
    { label: 'Memory Usage', val: r.memPct,  unit: '%' },
    { label: 'Disk Usage',   val: r.diskPct, unit: '%' },
  ].filter(i => i.val !== null && i.val !== undefined);

  if (!items.length) {
    document.getElementById('res-panel').innerHTML = '<div class="vpn-empty">No resource data</div>';
    return;
  }

  document.getElementById('res-panel').innerHTML = items.map(i => `
    <div class="res-item">
      <div class="res-header">
        <span class="res-name">${i.label}</span>
        <span class="res-val">${i.val}${i.unit}</span>
      </div>
      <div class="bar-track">
        <div class="bar-fill ${barClass(i.val)}" style="width:${Math.min(i.val,100)}%"></div>
      </div>
    </div>
  `).join('');
}

function renderSysInfo(sys) {
  if (!sys) return;
  const rows = [
    { k: 'Hostname',  v: sys.hostname },
    { k: 'Model',     v: sys.model },
    { k: 'Version',   v: sys.version },
    { k: 'Build',     v: sys.build },
    { k: 'Serial',    v: sys.serial },
    { k: 'Time',      v: sys.sysTime ? new Date(sys.sysTime).toLocaleString('vi-VN') : '' },
  ].filter(r => r.v);

  document.getElementById('sys-panel').innerHTML = rows.map(r => `
    <div class="info-row">
      <span class="info-key">${r.k}</span>
      <span class="info-val">${r.v}</span>
    </div>
  `).join('');
}

function renderInterfaces(ifaces, stats) {
  document.getElementById('iface-badge').textContent =
    `${stats?.ifaceUp ?? 0} up / ${stats?.ifaceTotal ?? 0}`;

  if (!ifaces || !ifaces.length) {
    document.getElementById('iface-panel').innerHTML = '<div class="vpn-empty">No interface data</div>';
    return;
  }

  document.getElementById('iface-panel').innerHTML = ifaces.map(i => {
    const speed = i.speed > 0 ? (i.speed >= 1000 ? (i.speed/1000)+'G' : i.speed+'M') : '';
    const badge = i.status === 'up'
      ? '<span class="badge-up">UP</span>'
      : '<span class="badge-down">DOWN</span>';
    const alias = i.alias ? ` <span class="iface-alias">(${i.alias})</span>` : '';
    const ip = i.ip && i.ip !== '0.0.0.0' ? `<div class="iface-ip">${i.ip}</div>` : '';
    const rx = fmtBytes(i.rxBytes);
    const tx = fmtBytes(i.txBytes);
    return `
      <div class="iface-item">
        <div class="iface-dot ${i.status}"></div>
        <div class="iface-info">
          <div class="iface-name">${i.name}${alias} ${badge}</div>
          ${ip}
        </div>
        <div class="iface-right">
          ${speed ? `<div class="iface-speed">${speed}bps</div>` : ''}
          <div class="iface-traffic">↓${rx} ↑${tx}</div>
        </div>
      </div>
    `;
  }).join('');
}

function renderVPN(vpns, stats) {
  document.getElementById('vpn-badge').textContent =
    `${stats?.vpnUp ?? 0} up / ${stats?.vpnTotal ?? 0}`;

  if (!vpns || !vpns.length) {
    document.getElementById('vpn-panel').innerHTML = '<div class="vpn-empty">No VPN tunnels configured</div>';
    return;
  }

  document.getElementById('vpn-panel').innerHTML = vpns.map(v => {
    const badge = v.status === 'up'
      ? '<span class="badge-up">UP</span>'
      : '<span class="badge-down">DOWN</span>';
    const rgwy = v.rgwy ? `<div class="vpn-rgwy">${v.rgwy}</div>` : '';
    const tunnels = v.tunnels.length ? v.tunnels.map(t => `
      <div class="vpn-tunnel-row">
        <span>${t.name || 'tunnel'} ${t.status === 'up' ? '🟢' : '🔴'}</span>
        <span>↓${fmtBytes(t.inBytes)} ↑${fmtBytes(t.outBytes)}</span>
      </div>
    `).join('') : '';
    return `
      <div class="vpn-item">
        <div class="vpn-header">
          <div class="vpn-name">${v.name} ${badge}</div>
          ${rgwy}
        </div>
        ${tunnels ? `<div class="vpn-tunnels">${tunnels}</div>` : ''}
      </div>
    `;
  }).join('');
}

// Auto-refresh every 30s
load();
setInterval(load, 30000);
</script>
</body>
</html>
