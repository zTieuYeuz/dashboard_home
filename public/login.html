<!DOCTYPE html>
<html lang="vi">
<head>
<link rel="icon" type="image/svg+xml" href="/favicon.svg"/>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Đăng nhập — Home Lab Dashboard</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#09090b;color:#f4f4f5;min-height:100vh;display:flex;align-items:center;justify-content:center;}
.card{background:#18181b;border:1px solid #27272a;border-radius:20px;padding:2.5rem 2rem;width:100%;max-width:380px;box-shadow:0 25px 50px rgba(0,0,0,.5);}
.logo-wrap{display:flex;align-items:center;justify-content:center;gap:12px;margin-bottom:2rem;}
.logo{width:44px;height:44px;background:linear-gradient(135deg,#3b82f6,#8b5cf6);border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:20px;box-shadow:0 4px 12px rgba(59,130,246,.35);}
.logo-text{font-size:18px;font-weight:700;letter-spacing:-.02em;}
.title{font-size:22px;font-weight:700;text-align:center;margin-bottom:.5rem;letter-spacing:-.02em;}
.sub{font-size:13px;color:#71717a;text-align:center;margin-bottom:2rem;}
.label{font-size:12px;font-weight:600;color:#a1a1aa;text-transform:uppercase;letter-spacing:.05em;margin-bottom:6px;display:block;}
.input{width:100%;padding:10px 14px;border-radius:10px;border:1px solid #27272a;background:#09090b;color:#f4f4f5;font-size:14px;outline:none;transition:border-color .15s;}
.input:focus{border-color:#3b82f6;}
.form-group{margin-bottom:1.25rem;}
.btn{width:100%;padding:11px;border-radius:10px;border:none;background:linear-gradient(135deg,#3b82f6,#6366f1);color:#fff;font-size:14px;font-weight:600;cursor:pointer;transition:opacity .15s;margin-top:.5rem;}
.btn:hover{opacity:.9;}
.btn:disabled{opacity:.5;cursor:not-allowed;}
.err{font-size:13px;color:#ef4444;background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.2);border-radius:8px;padding:10px 12px;margin-top:1rem;display:none;}
.err.show{display:block;}
</style>
</head>
<body>
<div class="card">
  <div class="logo-wrap">
    <div class="logo">🖥️</div>
    <div class="logo-text">Home Lab</div>
  </div>
  <div class="title">Đăng nhập</div>
  <div class="sub">Nhập thông tin để truy cập dashboard</div>

  <form onsubmit="doLogin(event)">
    <div class="form-group">
      <label class="label">Tên đăng nhập</label>
      <input class="input" id="username" type="text" autocomplete="username" placeholder="admin" required autofocus/>
    </div>
    <div class="form-group">
      <label class="label">Mật khẩu</label>
      <input class="input" id="password" type="password" autocomplete="current-password" placeholder="••••••••" required/>
    </div>
    <button class="btn" type="submit" id="loginBtn">Đăng nhập →</button>
    <div class="err" id="errMsg"></div>
  </form>
</div>

<script>
async function doLogin(e) {
  e.preventDefault();
  const btn = document.getElementById('loginBtn');
  const err = document.getElementById('errMsg');
  btn.disabled = true;
  btn.textContent = 'Đang đăng nhập...';
  err.classList.remove('show');
  try {
    const res = await fetch('/api/auth/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        username: document.getElementById('username').value.trim(),
        password: document.getElementById('password').value,
      })
    });
    const data = await res.json();
    if (res.ok && data.success) {
      window.location.href = '/';
    } else {
      err.textContent = data.error || 'Đăng nhập thất bại';
      err.classList.add('show');
    }
  } catch(ex) {
    err.textContent = 'Lỗi kết nối: ' + ex.message;
    err.classList.add('show');
  } finally {
    btn.disabled = false;
    btn.textContent = 'Đăng nhập →';
  }
}
</script>
</body>
</html>
