<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>VMware ESXi — Home Lab Dashboard</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0b0d14;--surface:#131620;--card:#1a1d2e;--border:#252840;
  --text:#e2e8f0;--muted:#64748b;--accent:#60a5fa;
  --green:#34d399;--red:#f87171;--amber:#fbbf24;--purple:#a78bfa;
  --green-dim:#052e16;--red-dim:#2d0a0a;--amber-dim:#2d1f00;--blue-dim:#0c1a2e;
}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
a{color:inherit;text-decoration:none}

/* Header */
.header{background:var(--surface);border-bottom:0.5px solid var(--border);padding:0 1.5rem;height:56px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
.header-left{display:flex;align-items:center;gap:12px}
.back-btn{display:flex;align-items:center;gap:6px;font-size:13px;color:var(--muted);padding:5px 10px;border-radius:6px;border:0.5px solid var(--border);transition:all .15s}
.back-btn:hover{color:var(--text);border-color:#3d4260;background:var(--card)}
.svc-icon{width:30px;height:30px;background:#1a2a1a;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:15px}
.svc-name{font-size:15px;font-weight:600}.svc-sub{font-size:11px;color:var(--muted)}
.header-right{display:flex;align-items:center;gap:10px}
.btn{font-size:12px;padding:5px 12px;border-radius:6px;border:0.5px solid var(--border);background:transparent;cursor:pointer;transition:all .15s}
.btn-accent{color:var(--accent)}.btn-accent:hover{background:var(--blue-dim);border-color:var(--accent)}
.btn-muted{color:var(--muted)}.btn-muted:hover{color:var(--text);border-color:#3d4260}
.status-dot{width:8px;height:8px;border-radius:50%;background:var(--green);box-shadow:0 0 6px var(--green)}

.container{max-width:1340px;margin:0 auto;padding:1.5rem}

/* Top stats */
.stats-row{display:grid;grid-template-columns:repeat(6,1fr);gap:10px;margin-bottom:1.25rem}
.stat{background:var(--card);border:0.5px solid var(--border);border-radius:10px;padding:.75rem 1rem;text-align:center}
.stat-value{font-size:24px;font-weight:700;line-height:1;margin-bottom:3px}
.stat-label{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.05em}
.c-blue{color:var(--accent)}.c-green{color:var(--green)}.c-red{color:var(--red)}.c-amber{color:var(--amber)}.c-purple{color:var(--purple)}

/* Two column layout */
.layout{display:grid;grid-template-columns:340px 1fr;gap:14px;align-items:start}

/* Panel */
.panel{background:var(--card);border:0.5px solid var(--border);border-radius:12px;overflow:hidden;margin-bottom:12px}
.panel-header{display:flex;align-items:center;justify-content:space-between;padding:.75rem 1rem;border-bottom:0.5px solid var(--border)}
.panel-title{font-size:13px;font-weight:600;display:flex;align-items:center;gap:8px}
.count-badge{font-size:11px;padding:1px 7px;border-radius:20px;background:var(--surface);color:var(--muted);border:0.5px solid var(--border)}

/* Host info rows */
.info-row{display:flex;align-items:center;justify-content:space-between;padding:.55rem 1rem;border-bottom:0.5px solid var(--border);font-size:12px}
.info-row:last-child{border-bottom:none}
.info-key{color:var(--muted)}
.info-val{font-weight:500;text-align:right;max-width:200px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}

/* Resource bars */
.res-block{padding:.875rem 1rem;border-bottom:0.5px solid var(--border)}
.res-block:last-child{border-bottom:none}
.res-header{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:6px}
.res-label{font-size:12px;font-weight:500}
.res-nums{font-size:11px;color:var(--muted)}
.res-bar{height:6px;background:var(--surface);border-radius:3px;overflow:hidden}
.res-fill{height:100%;border-radius:3px;transition:width .5s ease}
.fill-green{background:var(--green)}
.fill-amber{background:var(--amber)}
.fill-red{background:var(--red)}
.fill-blue{background:var(--accent)}

/* Search */
.search-wrap{padding:.625rem 1rem;border-bottom:0.5px solid var(--border);position:relative}
.search-input{width:100%;font-size:12px;padding:6px 10px 6px 28px;border-radius:7px;border:0.5px solid var(--border);background:var(--surface);color:var(--text);outline:none;transition:border-color .15s}
.search-input:focus{border-color:var(--accent)}
.search-icon{position:absolute;left:18px;top:50%;transform:translateY(-50%);color:var(--muted);font-size:12px;pointer-events:none}

/* VM table */
.vm-table{width:100%;border-collapse:collapse}
.vm-table th{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;padding:.5rem 1rem;text-align:left;border-bottom:0.5px solid var(--border);background:var(--surface);white-space:nowrap}
.vm-table td{padding:.65rem 1rem;border-bottom:0.5px solid var(--border);font-size:12px;vertical-align:middle}
.vm-table tr:last-child td{border-bottom:none}
.vm-table tr:hover td{background:#1e2238}
.vm-name{font-weight:600;font-size:13px}
.vm-sub{font-size:10px;color:var(--muted);margin-top:1px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:180px}
.power-badge{font-size:10px;padding:2px 8px;border-radius:20px;font-weight:500;white-space:nowrap}
.power-on{background:var(--green-dim);color:var(--green)}
.power-off{background:#1e293b;color:#475569}
.power-sus{background:var(--amber-dim);color:var(--amber)}
.mini-bar{height:4px;background:var(--surface);border-radius:2px;overflow:hidden;margin-top:3px;min-width:50px}
.mini-fill{height:100%;border-radius:2px}
.ip-badge{font-size:10px;padding:1px 7px;border-radius:20px;background:var(--blue-dim);color:var(--accent);border:0.5px solid #1a3a5c;font-family:monospace}

/* Datastore */
.ds-item{padding:.875rem 1rem;border-bottom:0.5px solid var(--border)}
.ds-item:last-child{border-bottom:none}
.ds-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:6px}
.ds-name{font-size:13px;font-weight:600}
.ds-meta{font-size:11px;color:var(--muted);display:flex;gap:8px;margin-bottom:6px}
.ds-type{background:var(--surface);border:0.5px solid var(--border);padding:1px 6px;border-radius:4px;font-size:10px}

/* Empty / loading */
.empty{padding:2rem;text-align:center;color:var(--muted);font-size:13px}
.loading{display:flex;align-items:center;justify-content:center;padding:2.5rem;color:var(--muted);font-size:13px;gap:8px}
.spin{width:16px;height:16px;border:2px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.err-banner{margin:1rem;background:var(--red-dim);border:0.5px solid #5a1a1a;border-radius:8px;padding:.875rem 1rem;font-size:13px;color:#f87171}
.warn-banner{margin:1rem;background:var(--amber-dim);border:0.5px solid #5a3a00;border-radius:8px;padding:.75rem 1rem;font-size:12px;color:var(--amber)}

/* Power actions */
.power-actions{display:flex;gap:4px;margin-top:6px}
.btn-power{background:var(--border);border:none;color:var(--text);border-radius:4px;padding:3px 6px;font-size:11px;cursor:pointer;opacity:0.8}
.btn-power:hover{opacity:1;background:var(--surface)}
.btn-power:disabled{opacity:0.4;cursor:not-allowed}

::-webkit-scrollbar{width:4px;height:4px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}
@media(max-width:900px){
  .layout{grid-template-columns:1fr}
  .stats-row{grid-template-columns:repeat(3,1fr)}
}
</style>
</head>
<body>

<header class="header">
  <div class="header-left">
    <a class="back-btn" href="/">← Dashboard</a>
    <div class="svc-icon">🖥️</div>
    <div>
      <div class="svc-name">VMware ESXi</div>
      <div class="svc-sub" id="esxiVersion">Đang tải...</div>
    </div>
  </div>
  <div class="header-right">
    <div class="status-dot" id="statusDot"></div>
    <span style="font-size:12px;color:var(--muted)" id="lastUpdate">—</span>
    <button class="btn btn-muted" onclick="loadData()">↻ Refresh</button>
    <a class="btn btn-accent" href="https://esxi.home-server.id.vn/ui/" target="_blank" rel="noopener">↗ Mở ESXi UI</a>
  </div>
</header>

<div class="container">

  <!-- Stats row -->
  <div class="stats-row">
    <div class="stat"><div class="stat-value c-blue"   id="st-total">—</div><div class="stat-label">Total VMs</div></div>
    <div class="stat"><div class="stat-value c-green"  id="st-on">—</div><div class="stat-label">Running</div></div>
    <div class="stat"><div class="stat-value c-red"    id="st-off">—</div><div class="stat-label">Stopped</div></div>
    <div class="stat"><div class="stat-value c-amber"  id="st-sus">—</div><div class="stat-label">Suspended</div></div>
    <div class="stat"><div class="stat-value c-purple" id="st-cpu">—</div><div class="stat-label">CPU Usage</div></div>
    <div class="stat"><div class="stat-value c-blue"   id="st-mem">—</div><div class="stat-label">Mem Usage</div></div>
  </div>

  <div class="layout">

    <!-- LEFT: Host info + Datastores -->
    <div>

      <!-- Host info -->
      <div class="panel">
        <div class="panel-header"><div class="panel-title">🖥️ Host Info</div></div>
        <div id="hostInfo"><div class="loading"><div class="spin"></div>Đang tải...</div></div>
      </div>

      <!-- Resources -->
      <div class="panel">
        <div class="panel-header"><div class="panel-title">📈 Resources</div></div>
        <div id="hostRes"><div class="loading"><div class="spin"></div>Đang tải...</div></div>
      </div>

      <!-- Datastores -->
      <div class="panel">
        <div class="panel-header"><div class="panel-title">💾 Datastores <span class="count-badge" id="dsCount">—</span></div></div>
        <div id="dsList"><div class="loading"><div class="spin"></div>Đang tải...</div></div>
      </div>

    </div>

    <!-- RIGHT: VM list -->
    <div>
      <div class="panel">
        <div class="panel-header">
          <div class="panel-title">🖥️ Virtual Machines <span class="count-badge" id="vmCount">—</span></div>
        </div>
        <div class="search-wrap">
          <span class="search-icon">🔍</span>
          <input class="search-input" id="vmSearch" placeholder="Tìm VM theo tên, IP, OS..." oninput="renderVMs()"/>
        </div>
        <div style="overflow-x:auto">
          <table class="vm-table">
            <thead><tr>
              <th>VM Name</th>
              <th>State</th>
              <th>Actions</th>
              <th>OS</th>
              <th>CPU</th>
              <th>Memory</th>
              <th>Storage</th>
              <th>IP</th>
              <th>Uptime</th>
            </tr></thead>
            <tbody id="vmTableBody">
              <tr><td colspan="9"><div class="loading"><div class="spin"></div>Đang tải...</div></td></tr>
            </tbody>
          </table>
        </div>
      </div>
    </div>

  </div>
</div>

<script>
var allVMs = [], hostData = null, datastores = [];

/* ── helpers ── */
function fmtUptime(secs) {
  if (!secs) return '—';
  var d = Math.floor(secs / 86400);
  var h = Math.floor((secs % 86400) / 3600);
  var m = Math.floor((secs % 3600) / 60);
  if (d > 0) return d + 'd ' + h + 'h';
  if (h > 0) return h + 'h ' + m + 'm';
  return m + 'm';
}

function fmtMem(mb) {
  if (!mb && mb !== 0) return '—';
  if (mb >= 1024) return (mb / 1024).toFixed(1) + ' GB';
  return mb + ' MB';
}

function fmtGB(gb) {
  if (!gb && gb !== 0) return '—';
  return gb.toFixed(1) + ' GB';
}

function barColor(pct) {
  if (pct >= 90) return 'fill-red';
  if (pct >= 70) return 'fill-amber';
  return 'fill-green';
}

function hostStatusColor(s) {
  if (s === 'green') return 'c-green';
  if (s === 'yellow') return 'c-amber';
  if (s === 'red') return 'c-red';
  return 'c-muted';
}

function timeAgo(iso) {
  if (!iso) return '—';
  var diff = Date.now() - new Date(iso).getTime();
  var m = Math.floor(diff / 60000);
  if (m < 1) return 'vừa xong';
  if (m < 60) return m + 'ph';
  var h = Math.floor(m / 60);
  if (h < 24) return h + 'h ' + (m % 60) + 'm';
  return Math.floor(h / 24) + 'd';
}

/* ── Render host info ── */
function renderHost() {
  var h = hostData;
  if (!h) { document.getElementById('hostInfo').innerHTML = '<div class="empty">Không có dữ liệu host</div>'; return; }

  var statusLabel = h.overallStatus === 'green' ? '✓ Normal' : h.overallStatus === 'yellow' ? '⚠ Warning' : h.overallStatus || '—';
  var statusCls   = hostStatusColor(h.overallStatus);

  document.getElementById('hostInfo').innerHTML = [
    row('Hostname',      h.name || '—'),
    row('CPU Model',     h.cpuModel || '—'),
    row('CPU Cores',     h.numCpuCores + ' cores / ' + h.numCpuThreads + ' threads'),
    row('Total Memory',  fmtMem(h.memTotalMB)),
    row('Uptime',        fmtUptime(h.uptime)),
    row('Connection',    h.connectionState || '—'),
    row('Status',        '<span class="' + statusCls + '">' + statusLabel + '</span>'),
  ].join('');

  /* resources */
  var cpuBar = barColor(h.cpuPct);
  var memBar = barColor(h.memPct);
  document.getElementById('hostRes').innerHTML =
    '<div class="res-block">'
    + '<div class="res-header"><span class="res-label">CPU</span>'
    + '<span class="res-nums">' + h.usedCpuMhz + ' / ' + h.totalCpuMhz + ' MHz (' + h.cpuPct + '%)</span></div>'
    + '<div class="res-bar"><div class="res-fill ' + cpuBar + '" style="width:' + h.cpuPct + '%"></div></div>'
    + '</div>'
    + '<div class="res-block">'
    + '<div class="res-header"><span class="res-label">Memory</span>'
    + '<span class="res-nums">' + fmtMem(h.memUsedMB) + ' / ' + fmtMem(h.memTotalMB) + ' (' + h.memPct + '%)</span></div>'
    + '<div class="res-bar"><div class="res-fill fill-blue" style="width:' + h.memPct + '%"></div></div>'
    + '</div>';

  /* stats bar */
  document.getElementById('st-cpu').textContent = h.cpuPct + '%';
  document.getElementById('st-mem').textContent = h.memPct + '%';
}

function row(key, val) {
  return '<div class="info-row"><span class="info-key">' + key + '</span><span class="info-val">' + val + '</span></div>';
}

/* ── Render Datastores ── */
function renderDatastores() {
  document.getElementById('dsCount').textContent = datastores.length;
  if (!datastores.length) { document.getElementById('dsList').innerHTML = '<div class="empty">Không có datastore</div>'; return; }
  document.getElementById('dsList').innerHTML = datastores.map(function(ds) {
    var pctBar = barColor(ds.usedPct);
    return '<div class="ds-item">'
      + '<div class="ds-header">'
        + '<div class="ds-name">' + (ds.name || '—') + '</div>'
        + '<span style="font-size:11px;color:var(--muted)">' + ds.usedPct + '% used</span>'
      + '</div>'
      + '<div class="ds-meta">'
        + '<span class="ds-type">' + (ds.type || 'Unknown') + '</span>'
        + '<span>' + fmtGB(ds.usedGB) + ' used of ' + fmtGB(ds.capacityGB) + '</span>'
        + '<span style="color:var(--green)">Free: ' + fmtGB(ds.freeGB) + '</span>'
      + '</div>'
      + '<div class="res-bar"><div class="res-fill ' + pctBar + '" style="width:' + ds.usedPct + '%"></div></div>'
    + '</div>';
  }).join('');
}

/* ── Render VMs ── */
function renderVMs() {
  var q = (document.getElementById('vmSearch').value || '').toLowerCase();
  var list = allVMs.filter(function(v) {
    return !q
      || (v.name || '').toLowerCase().includes(q)
      || (v.ipAddress || '').includes(q)
      || (v.guestOS || '').toLowerCase().includes(q)
      || (v.hostName || '').toLowerCase().includes(q);
  });
  document.getElementById('vmCount').textContent = list.length + '/' + allVMs.length;

  if (!list.length) {
    document.getElementById('vmTableBody').innerHTML = '<tr><td colspan="9"><div class="empty">Không tìm thấy VM</div></td></tr>';
    return;
  }

  document.getElementById('vmTableBody').innerHTML = list.map(function(v) {
    var ps = v.powerState;
    var badgeCls = ps === 'poweredOn' ? 'power-on' : ps === 'suspended' ? 'power-sus' : 'power-off';
    var badgeTxt = ps === 'poweredOn' ? '▶ Running' : ps === 'suspended' ? '⏸ Suspended' : '■ Stopped';

    var cpuBar = '<div style="font-size:11px;font-variant-numeric:tabular-nums">' + v.cpuUsageMhz + ' MHz</div>'
      + '<div class="mini-bar"><div class="mini-fill ' + barColor(v.cpuPct) + '" style="width:' + Math.min(v.cpuPct, 100) + '%"></div></div>';

    var memBar = '<div style="font-size:11px">' + fmtMem(v.memUsedMB) + ' / ' + fmtMem(v.memoryMB) + '</div>'
      + '<div class="mini-bar"><div class="mini-fill fill-blue" style="width:' + Math.min(v.memPct, 100) + '%"></div></div>';

    var uptimeTxt = ps === 'poweredOn' ? timeAgo(v.bootTime) : '—';

    // Power actions UI
    var actions = '';
    if (ps === 'poweredOff' || ps === 'suspended') {
      actions += '<button class="btn-power" style="color:var(--green)" onclick="doPower(\'' + v.id + '\', \'' + (v.name||'') + '\', \'powerOn\')">▶ Bật</button>';
    } else {
      actions += '<button class="btn-power" style="color:var(--amber)" onclick="doPower(\'' + v.id + '\', \'' + (v.name||'') + '\', \'suspend\')">⏸ Suspend</button>';
      actions += '<button class="btn-power" style="color:var(--red)" onclick="doPower(\'' + v.id + '\', \'' + (v.name||'') + '\', \'powerOff\')">■ Tắt (Force)</button>';
      actions += '<button class="btn-power" style="color:var(--purple)" onclick="doPower(\'' + v.id + '\', \'' + (v.name||'') + '\', \'reset\')">🔄 Reset</button>';
    }

    return '<tr>'
      + '<td><div class="vm-name">' + (v.name || '—') + '</div>'
        + (v.annotation ? '<div class="vm-sub" title="' + v.annotation + '">' + v.annotation + '</div>' : '')
      + '</td>'
      + '<td><span class="power-badge ' + badgeCls + '">' + badgeTxt + '</span></td>'
      + '<td><div class="power-actions">' + actions + '</div></td>'
      + '<td><div style="font-size:11px;max-width:130px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap" title="' + (v.guestOS || '') + '">' + (v.guestOS || '—') + '</div></td>'
      + '<td>' + (v.numCPU ? v.numCPU + ' vCPU' : '—') + (ps === 'poweredOn' ? '<br>' + cpuBar : '') + '</td>'
      + '<td>' + (ps === 'poweredOn' ? memBar : fmtMem(v.memoryMB)) + '</td>'
      + '<td>' + fmtGB(v.storageGB) + '</td>'
      + '<td>' + (v.ipAddress ? '<span class="ip-badge">' + v.ipAddress + '</span>' : '<span style="color:var(--muted)">—</span>') + '</td>'
      + '<td style="color:var(--muted);font-size:11px">' + uptimeTxt + '</td>'
    + '</tr>';
  }).join('');
}

/* ── VM Power Action ── */
function doPower(vmId, vmName, action) {
  var actionTexts = {
    'powerOn': 'Bật',
    'powerOff': 'Tắt (Force Off)',
    'suspend': 'Suspend',
    'reset': 'Reset'
  };
  if (!confirm('Bạn có chắc muốn ' + actionTexts[action] + ' VM "' + vmName + '"?')) return;

  var btns = document.querySelectorAll('.btn-power');
  btns.forEach(function(b) { b.disabled = true; });

  fetch('/api/esxi/power', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({ vmId: vmId, action: action })
  })
  .then(function(r) { return r.json(); })
  .then(function(res) {
    if (res.error || !res.success) alert('Lỗi: ' + (res.error || 'Unknown error'));
    else {
      // Đợi task API 1 tí rồi reload host data
      setTimeout(loadData, 1000);
    }
  })
  .catch(function(e) {
    alert('Lỗi gửi request: ' + e.message);
  })
  .finally(function() {
    btns.forEach(function(b) { b.disabled = false; });
  });
}

/* ── Load data ── */
function loadData() {
  document.getElementById('statusDot').style.background = 'var(--amber)';
  document.getElementById('statusDot').style.boxShadow  = '0 0 6px var(--amber)';

  fetch('/api/esxi', { cache: 'no-store' })
    .then(function(r) { return r.json(); })
    .then(function(data) {
      /* version header */
      if (data.about && data.about.fullName) {
        document.getElementById('esxiVersion').textContent = data.about.fullName;
      }

      /* stats */
      var s = data.stats || {};
      document.getElementById('st-total').textContent = s.totalVMs ?? '—';
      document.getElementById('st-on').textContent    = s.poweredOn  ?? '—';
      document.getElementById('st-off').textContent   = s.poweredOff ?? '—';
      document.getElementById('st-sus').textContent   = s.suspended  ?? '—';

      /* error / warning */
      if (data.error && !data.host) {
        document.getElementById('hostInfo').innerHTML =
          '<div class="err-banner">⚠ ' + data.error + '</div>'
          + '<div class="warn-banner">💡 Cần set secrets: <code>npx wrangler secret put ESXI_USER</code> và <code>npx wrangler secret put ESXI_PASSWORD</code></div>';
        document.getElementById('statusDot').style.background = 'var(--amber)';
        document.getElementById('statusDot').style.boxShadow  = '0 0 6px var(--amber)';
        return;
      }

      hostData   = data.host || null;
      allVMs     = data.vms || [];
      datastores = data.datastores || [];

      renderHost();
      renderVMs();
      renderDatastores();

      /* status dot */
      var ok = hostData && hostData.connectionState === 'connected';
      document.getElementById('statusDot').style.background = ok ? 'var(--green)' : 'var(--red)';
      document.getElementById('statusDot').style.boxShadow  = ok ? '0 0 6px var(--green)' : '0 0 6px var(--red)';

      var now = new Date();
      document.getElementById('lastUpdate').textContent =
        now.getHours().toString().padStart(2, '0') + ':' + now.getMinutes().toString().padStart(2, '0');
    })
    .catch(function(e) {
      document.getElementById('hostInfo').innerHTML = '<div class="err-banner">⚠ ' + e.message + '</div>';
      document.getElementById('statusDot').style.background = 'var(--red)';
      document.getElementById('statusDot').style.boxShadow  = '0 0 6px var(--red)';
    });
}

loadData();
setInterval(loadData, 60000);
</script>
</body>
</html>
