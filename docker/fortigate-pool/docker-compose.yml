# ──────────────────────────────────────────────────────────────────────────
# FortiGate POOL — 3 admin + 2 view slots, tối đa 5 người dùng đồng thời.
# Mỗi container = 1 "chỗ ngồi" (role cố định: admin hoặc view).
#
# Port plan:
#   a1: 6911 (kasm) / 8911 (nav)  → kasm-a1.home-server.id.vn / nav-a1.home-server.id.vn
#   a2: 6912 / 8912               → kasm-a2 / nav-a2
#   a3: 6913 / 8913               → kasm-a3 / nav-a3
#   v1: 6914 / 8914               → kasm-v1 / nav-v1
#   v2: 6915 / 8915               → kasm-v2 / nav-v2
#
# Hướng dẫn bật slot mới:
#   1. Tạo 2 CF Tunnel: kasm-aX.home-server.id.vn → 192.168.110.21:69XX
#                       nav-aX.home-server.id.vn  → 192.168.110.21:89XX
#   2. Bỏ comment service tương ứng bên dưới
#   3. docker compose up -d
#   4. Uncomment slot trong FGT_POOL_SLOTS (worker.js) rồi deploy staging
# ──────────────────────────────────────────────────────────────────────────

services:

  # ── Slot a1: ADMIN (đang chạy) ───────────────────────────────────────────
  # NOTE: dịch vụ dùng IP LAN (192.168.x / 10.x / 172.16-31.x) đã được navigator.py
  #       cho phép sẵn — KHÔNG cần thêm gì. NAV_ALLOW_SUFFIX để đó thì domain vẫn mở
  #       được song song. Chỉ chạy 1 slot vì 1 người dùng (dồn CPU/RAM cho mượt).
  fgt-slot-admin1:
    image: kasmweb/chrome:1.16.0
    container_name: fgt-slot-admin1
    restart: unless-stopped
    shm_size: "2gb"          # tăng từ 1gb → 2gb: thêm chỗ render trang nặng (cần máy đủ RAM)
    ports:
      - "6911:6901"   # KasmVNC stream  → kasm-a1.home-server.id.vn
      - "8911:8080"   # Navigator API   → nav-a1.home-server.id.vn
    environment:
      VNC_PW: "${VNC_PW:-changeme}"
      VNCOPTIONS: "-DisableBasicAuth 1 -SecurityTypes None"
      FGT_URL:  "${FGT_URL:-https://192.168.110.1/}"
      FGT_USER: "${ADM_USER:-}"
      FGT_PASS: "${ADM_PASS:-}"
      HIK_USER: "${HIK_USER:-admin}"   # Camera NVR (Hikvision DVR) auto-login
      HIK_PASS: "${HIK_PASS:-}"
      NAV_ALLOW_SUFFIX: "${NAV_ALLOW_SUFFIX:-.home-server.id.vn}"
    volumes:
      - ./custom_startup.sh:/dockerstartup/custom_startup.sh:ro
      - ./navigator.py:/opt/navigator.py:ro
      - ./pool-extension:/opt/pool-ext:ro
    security_opt:
      - seccomp:unconfined

