# ──────────────────────────────────────────────────────────────────────────
# fortigate-browser — Chrome chạy trong Docker, stream qua KasmVNC (WS/HTTPS)
# ──────────────────────────────────────────────────────────────────────────
# Vì sao cần cái này:
#   FortiGate (FortiOS SPA) TỪ CHỐI render khi bị nhúng iframe (self !== top,
#   anti-clickjacking, không sửa được). Giải pháp: chạy 1 trình duyệt Chrome
#   BÊN TRONG container và mở FortiGate như tab top-level ở đó -> FortiOS tưởng
#   nó chạy full-screen -> vẽ UI đầy đủ. Dashboard chỉ nhúng LUỒNG HÌNH KasmVNC
#   (vốn được thiết kế để nhúng), không nhúng FortiGate trực tiếp.
#
# KasmVNC stream qua WebSocket/HTTPS -> chui Cloudflare Tunnel ngon (không UDP
# như WebRTC của Neko).
#
# Deploy:  docker compose up -d
# Test LAN: https://192.168.110.21:6901  (self-signed, bỏ qua cảnh báo)
#           user: kasm_user   |   pass: giá trị VNC_PW bên dưới
# ──────────────────────────────────────────────────────────────────────────

services:
  fortigate-browser:
    image: kasmweb/chrome:1.16.0          # tag mới nhất: hub.docker.com/r/kasmweb/chrome/tags
    container_name: fortigate-browser
    restart: unless-stopped

    # Chrome cần /dev/shm lớn — thiếu là tab tự crash (trang trắng).
    shm_size: "1gb"

    ports:
      # KasmVNC HTTPS (self-signed) trong container. Cloudflare Tunnel sẽ trỏ
      # origin vào https://192.168.110.21:6901 (bật No-TLS-Verify).
      - "6901:6901"

    environment:
      # Mật khẩu đăng nhập KasmVNC (user mặc định: kasm_user).
      # >>> ĐỔI thành mật khẩu mạnh trước khi chạy <<<
      VNC_PW: "CHANGE_ME_doi_mat_khau_manh"

      # ──────────────────────────────────────────────────────────────────────
      # TẮT AUTH để nhúng trực tiếp vào dashboard (browser kết nối WS thẳng tới
      # kasm.home-server.id.vn — Cloudflare Worker KHÔNG proxy được WebSocket
      # tới hostname cũng nằm sau CF Tunnel). VNCOPTIONS được kasmweb chèn vào
      # lệnh `vncserver` (xem /dockerstartup/vnc_startup.sh).
      #   -DisableBasicAuth 1 : bỏ Basic Auth của websocket (hết form đăng nhập)
      #   -SecurityTypes None : bỏ mật khẩu VNC (noVNC connect thẳng, không prompt)
      # ⚠️ Service thành OPEN — bảo vệ bằng hostname tunnel kín + (khuyến nghị)
      #    Cloudflare Access gate theo email.
      VNCOPTIONS: "-DisableBasicAuth 1 -SecurityTypes None"

      # (tuỳ chọn) tắt hardware decode nếu hình bị nhiễu trên 1 số máy:
      # KASM_RX_HW_DECODE: "0"

    # custom_startup.sh: mở Chrome ở chế độ kiosk (không có thanh địa chỉ/tab)
    # → KasmVNC stream chỉ hiện nội dung FortiGate, không có UI của Chrome.
    volumes:
      - ./custom_startup.sh:/dockerstartup/custom_startup.sh:ro
      # Extension auto-login FortiGate (điền user/pass trong fortigate-autologin/autologin.js)
      - ./fortigate-autologin:/opt/fortigate-autologin:ro

    # Một số kernel cần dòng này để Chrome sandbox không lỗi:
    security_opt:
      - seccomp:unconfined

    # (tuỳ chọn) giới hạn tài nguyên cho gọn — Chrome + stream khá nặng:
    # deploy:
    #   resources:
    #     limits:
    #       memory: 2g
