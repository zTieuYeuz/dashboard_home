name = "dashboard-system"
main = "worker.js"
compatibility_date = "2024-01-01"

[assets]
directory = "./public"
binding = "ASSETS"
# Run the Worker BEFORE serving static files so auth, security headers and the
# shared navigation injection actually apply to HTML pages. Without this,
# Cloudflare serves *.html straight from the edge and the Worker never runs.
run_worker_first = true

[[kv_namespaces]]
binding = "DASHBOARD_KV"
id = "ebad8682cfe24bbda0a4cf04b3e97210"

# Custom domain — trỏ dashboard.home-server.id.vn → Worker này
[[routes]]
pattern = "dashboard.home-server.id.vn"
custom_domain = true
