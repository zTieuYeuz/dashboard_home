# Scrypted — Self-hosted camera platform
# Deploy trên CasaOS: copy file này lên server, chạy docker compose up -d
# Web UI: https://casaos-ip:10443  (set password lần đầu đăng nhập)
#
# network_mode: host — BẮT BUỘC cho WebRTC + mDNS hoạt động đúng
# Nếu muốn dùng bridge mode: xem phần comment ở cuối file

services:
  scrypted:
    image: ghcr.io/koush/scrypted:latest
    container_name: scrypted
    restart: unless-stopped
    network_mode: host
    environment:
      - TZ=Asia/Ho_Chi_Minh
      - SCRYPTED_INSECURE_PORT=1880          # HTTP (redirect sang HTTPS)
      - SCRYPTED_SECURE_PORT=10443           # HTTPS Web UI + API
    volumes:
      # Config + database + plugins
      - /home/administrator/Documents/scrypted/data:/server/volume
      # Recordings — dùng NAS mount (cùng NAS với Frigate nhưng folder riêng)
      - /mnt/nas-scrypted:/recordings
      # Cho phép Scrypted dùng hardware info của host
      - /etc/localtime:/etc/localtime:ro
    deploy:
      resources:
        limits:
          memory: 4G        # Điều chỉnh nếu cần — Xeon 128GB đủ sức
        reservations:
          memory: 1G
    logging:
      driver: json-file
      options:
        max-size: 50m
        max-file: "3"

# ─── Hướng dẫn sau khi chạy ────────────────────────────────────────────────
#
# 1. Chuẩn bị thư mục:
#    mkdir -p /home/administrator/Documents/scrypted/data
#    mkdir -p /mnt/nas-scrypted
#
# 2. NAS mount cho recordings (thêm vào /etc/fstab):
#    192.168.110.21:/volume2/scrypted /mnt/nas-scrypted nfs defaults,_netdev 0 0
#    mount -a
#
# 3. Chạy:
#    docker compose up -d
#
# 4. Truy cập: https://192.168.130.x:10443
#    - Lần đầu: tạo admin account
#    - Vào Settings → Plugins → cài: Hikvision Camera, go2rtc, OpenCV, ONNX
#
# 5. Plugins cần cài:
#    ✅ Hikvision Camera     — kết nối trực tiếp cam Hikvision (RTSP + events)
#    ✅ ONVIF Camera          — backup nếu Hikvision plugin không nhận
#    ✅ go2rtc                — WebRTC streaming chất lượng cao (built-in)
#    ✅ OpenCV                — motion detection nhẹ, chạy CPU
#    ✅ ONNX                  — AI object detection chạy CPU (COCO model)
#    ✅ Frigate NVR           — (tuỳ chọn) kết nối lại Frigate để dùng cả 2
#    ✅ Webhook               — trigger sự kiện ra ngoài (n8n, dashboard)
#    ⬜ Homebridge / HomeKit  — nếu anh dùng Apple ecosystem
#
# 6. Bảo mật:
#    - Đổi password ngay sau lần đầu login
#    - KHÔNG expose port 10443 ra internet trực tiếp
#    - Truy cập qua CF Tunnel (tạo tunnel mới: scrypted.home-server.id.vn)
#    - CF Access rule: chỉ email tranminhthoai788@gmail.com

# ─── Bridge mode (thay thế nếu không muốn host network) ────────────────────
# Bỏ comment phần dưới và xóa "network_mode: host" ở trên
# Lưu ý: WebRTC có thể không hoạt động hoàn hảo với bridge mode
#
#    ports:
#      - "10443:10443"     # HTTPS UI
#      - "1880:1880"       # HTTP
#      - "5540:5540"       # Scrypted Home Hub
#      - "34135:34135/udp" # WebRTC STUN/TURN
